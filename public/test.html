<!DOCTYPE html>
<html>
<head>
    <title>知识管理系统 - 连接测试</title>
    <style>
        body { font-family: sans-serif; padding: 40px; text-align: center; }
        .status { padding: 20px; margin: 20px; border-radius: 10px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        code { background: #f8f9fa; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🔧 知识管理系统 - 连接测试</h1>
    
    <div class="status info">
        <h3>📡 服务器状态</h3>
        <p id="server-status">检测中...</p>
    </div>
    
    <div class="status info">
        <h3>🌐 访问信息</h3>
        <p><strong>容器内地址:</strong> <code>http://localhost:3000</code></p>
        <p><strong>宿主机地址:</strong> <code>http://宿主机IP:映射端口</code></p>
        <p><strong>外网地址:</strong> <code>http://你的公网IP:映射端口</code></p>
    </div>
    
    <div class="status info">
        <h3>🔗 测试链接</h3>
        <p><a href="/api/status" target="_blank">API状态</a> | <a href="/" target="_blank">首页</a> | <a href="/test.html" target="_blank">本测试页</a></p>
    </div>
    
    <div class="status info">
        <h3>💡 故障排除</h3>
        <ol style="text-align: left; max-width: 600px; margin: 0 auto;">
            <li>确认Docker端口映射：<code>docker ps</code> 查看PORTS列</li>
            <li>在宿主机测试：<code>curl http://localhost:映射端口</code></li>
            <li>检查防火墙：云服务商安全组、宿主机防火墙</li>
            <li>确认公网IP正确</li>
        </ol>
    </div>
    
    <script>
        // 测试API连接
        fetch('/api/status')
            .then(response => response.json())
            .then(data => {
                document.getElementById('server-status').innerHTML = 
                    `✅ 服务器运行正常 | 版本: ${data.version} | 时间: ${new Date(data.timestamp).toLocaleString()}`;
            })
            .catch(error => {
                document.getElementById('server-status').innerHTML = 
                    `❌ 服务器连接失败: ${error.message}`;
            });
    </script>
</body>
</html>
